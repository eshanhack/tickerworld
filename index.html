<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Tickerworld is coming soon." />
    <title>Tickerworld</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #09090b;
        color: #fafafa;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 20%, #172554 0, transparent 40%),
          #09090b;
      }

      main {
        width: min(90%, 42rem);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 7rem);
        letter-spacing: -0.07em;
      }

      p {
        margin: 1rem 0 0;
        color: #a1a1aa;
        font-size: 1.1rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 2rem;
        padding: 0.5rem 0.8rem;
        border: 1px solid #27272a;
        border-radius: 999px;
        color: #d4d4d8;
        font-size: 0.85rem;
      }

      .dot {
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 1rem #22c55e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tickerworld</h1>
      <p>A new way to explore the market. Coming soon.</p>
      <div class="status"><span class="dot"></span>Building in public</div>
    </main>
  </body>
</html>
